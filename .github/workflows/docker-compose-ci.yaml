name: Docker Compose CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker-compose-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yaml
        run: docker compose -f compose/docker-compose.yaml config

      - name: Validate n8n-compose.yaml
        run: docker compose -f compose/n8n-compose.yaml config
